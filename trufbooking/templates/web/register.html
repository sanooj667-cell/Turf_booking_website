{% extends 'base/web-base.html' %}

{% block container %}
<main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="surface-panel w-full max-w-xl p-6 md:p-8">
        <a href="{% url 'web:index' %}" class="brand-mark inline-block mb-4">TRUFBOOK</a>
        <h1 class="section-title">Create Your Account</h1>
        <p class="muted mt-2">Start booking turfs and managing your game schedule.</p>

        <div class="mt-5">
            {% include 'includes/messages.html' %}
        </div>

        <form method="POST" class="form-shell mt-5 space-y-4">
            {% csrf_token %}

            <div>
                <label for="name" class="form-label">Full Name</label>
                <input id="name" type="text" name="name" required>
            </div>

            <div>
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" name="email" required>
            </div>

            <div>
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" name="password" required>
            </div>

            <div>
                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input id="confirm-password" type="password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <p class="text-sm muted mt-5">
            Already registered?
            <a href="{% url 'web:login' %}" class="font-semibold text-emerald-700 hover:underline">Sign in</a>
        </p>
    </section>
</main>
{% endblock %}
