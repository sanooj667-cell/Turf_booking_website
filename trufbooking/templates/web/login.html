{% extends 'base/web-base.html' %}
{% load static %}

{% block container %}
<main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="surface-panel w-full max-w-5xl overflow-hidden">
        <div class="grid md:grid-cols-[0.9fr_1.1fr] items-center">
            <div class="relative h-48 sm:h-56 md:h-[430px] lg:h-[470px] md:m-6 md:mr-0 md:rounded-2xl md:overflow-hidden md:self-center">
                <img src="{% static 'images/login_bg.jpg' %}" alt="Login visual" class="h-full w-full object-cover object-center">
                <div class="absolute inset-0 bg-gradient-to-tr from-emerald-900/60 via-emerald-700/20 to-transparent hidden md:block"></div>
                <div class="absolute bottom-8 left-8 right-8 text-white space-y-2 hidden md:block">
                    <p class="eyebrow !text-white/90">Welcome Back</p>
                    <h1 class="text-3xl font-semibold">Access your booking workspace.</h1>
                </div>
            </div>

            <div class="p-6 md:p-10">
                <a href="{% url 'web:index' %}" class="brand-mark inline-block mb-5">TRUFBOOK</a>
                <h2 class="section-title">Sign In</h2>
                <p class="muted mt-2">Select your role and continue to your dashboard.</p>

                <div class="mt-5">
                    {% include 'includes/messages.html' %}
                </div>

                <form method="POST" class="form-shell mt-5 space-y-4">
                    {% csrf_token %}

                    <div>
                        <label for="role" class="form-label">Login As</label>
                        <select id="role" name="role" required>
                            <option value="">Select role</option>
                            <option value="admin">Admin</option>
                            <option value="owner">Owner</option>
                            <option value="user">User</option>
                        </select>
                    </div>

                    <div>
                        <label for="email" class="form-label">Email</label>
                        <input id="email" type="email" name="email" required>
                    </div>

                    <div>
                        <label for="password" class="form-label">Password</label>
                        <input id="password" type="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <p class="text-sm muted mt-5">
                    Do not have an account?
                    <a href="{% url 'web:register' %}" class="font-semibold text-emerald-700 hover:underline">Create one</a>
                </p>
            </div>
        </div>
    </section>
</main>
{% endblock %}
